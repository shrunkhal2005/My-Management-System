server.port=${PORT:8082}
spring.application.name=user-service
# Datasource: prefer explicit SPRING_DATASOURCE_URL, then DATABASE_URL, then a Postgres default.
# To use MySQL, set `SPRING_DATASOURCE_URL=jdbc:mysql://...` and optionally `SPRING_DATASOURCE_USERNAME`/`SPRING_DATASOURCE_PASSWORD`.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:file:./data/user_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect defaults to Postgres but can be overridden with SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
management.endpoints.web.exposure.include=health,info
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
# Register with host-reachable URLs so links in the Eureka UI work from the browser
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.status-page-url=http://localhost:${server.port}/
eureka.instance.health-check-url=http://localhost:${server.port}/actuator/health
