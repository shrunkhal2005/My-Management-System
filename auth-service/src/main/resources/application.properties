server.port=${PORT:8081}
spring.application.name=auth-service
spring.datasource.url=jdbc:h2:file:./data/auth_db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
user.service.base-url=${USER_SERVICE_BASE_URL:http://localhost:8082}
auth.jwt.secret=${AUTH_JWT_SECRET:dev-only-change-me}
auth.jwt.ttl-seconds=${AUTH_JWT_TTL_SECONDS:7200}
