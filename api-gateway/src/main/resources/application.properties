server.port=${PORT:8080}
spring.application.name=api-gateway
spring.main.web-application-type=reactive

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
# Register with a host-reachable URL so links in the Eureka UI work from the browser
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.status-page-url=http://localhost:${server.port}/actuator/info
eureka.instance.health-check-url=http://localhost:${server.port}/actuator/health

management.endpoints.web.exposure.include=health,info

spring.cloud.gateway.routes[0].id=auth-service-ui
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/,/app.js,/styles.css,/favicon.ico,/auth/**

spring.cloud.gateway.routes[1].id=user-service-api
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**