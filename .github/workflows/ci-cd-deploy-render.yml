name: CI/CD - Validate and trigger Render deploy hooks

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Build with Maven
      run: mvn -B package -DskipTests

  deploy-render:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Render deploy hooks (optional)
      shell: bash
      env:
        RENDER_DEPLOY_HOOK_URLS: ${{ secrets.RENDER_DEPLOY_HOOK_URLS }}
      run: |
        if [ -z "$RENDER_DEPLOY_HOOK_URLS" ]; then
          echo "RENDER_DEPLOY_HOOK_URLS is not configured. Skipping Render deployment hooks."
          exit 0
        fi

        IFS=',' read -ra HOOKS <<< "$RENDER_DEPLOY_HOOK_URLS"

        for HOOK in "${HOOKS[@]}"; do
          URL="$(echo "$HOOK" | xargs)"
          if [ -z "$URL" ]; then
            continue
          fi
          echo "Triggering Render deploy hook: $URL"
          curl --fail-with-body -X POST "$URL"
        done
