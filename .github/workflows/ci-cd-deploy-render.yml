name: CI/CD — Build, push image, deploy to Render

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Build with Maven
      run: mvn -B package -DskipTests

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/jfx-app:latest
          ghcr.io/${{ github.repository_owner }}/jfx-app:${{ github.sha }}

  deploy-render:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Render deploy (optional)
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/jfx-app:latest
      run: |
        if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
          echo "Render secrets are not configured. Skipping Render deployment."
          exit 0
        fi

        echo "Triggering Render deploy for service: $RENDER_SERVICE_ID"
        curl --fail-with-body -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
          -H "Accept: application/json" \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"clearCache": true, "dockerCommand": "", "image": "'$IMAGE_TAG'"}'
